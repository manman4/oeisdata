name: Auto Merge from Upstream

on:
  workflow_dispatch:   # 手動実行
  schedule:
    - cron: '30 7 * * *' # UTC 07:30 = 日本時間 16:30
    - cron: '30 8 * * *' # UTC 08:30 = 日本時間 17:30

concurrency:
  group: merge-upstream
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      # 1. リポジトリを checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      # 2. LFS 無効化（git config のみ。.gitattributes はマージ後に対処）
      - name: Disable LFS
        run: |
          git lfs uninstall --local || true
          git config --global filter.lfs.smudge "cat"
          git config --global filter.lfs.process "cat"
          git config --global filter.lfs.required false

      # 3. git 設定
      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 4. upstream を追加して最新を fetch
      - name: Add upstream
        run: |
          git remote add upstream https://github.com/oeis/oeisdata.git
          git fetch upstream main

      # 4.5. 変更がなければスキップ
      - name: Check for upstream changes
        id: check
        run: |
          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits from upstream. Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # 5. main をリセットしてクリーンに
      - name: Reset main to origin
        if: steps.check.outputs.skip != 'true'
        run: |
          git reset --hard origin/main
          git clean -fd

      # 6. upstream をマージ
      - name: Merge upstream/main into main
        if: steps.check.outputs.skip != 'true'
        run: |
          git merge upstream/main --no-edit || {
            echo "Merge failed (conflict?)"
            exit 1
          }

      # 7. マージ後に .gitattributes の LFS 設定を除去してコミット
      - name: Remove LFS attributes after merge
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ -f .gitattributes ]; then
            grep -v 'filter=lfs' .gitattributes > .gitattributes.tmp || true
            if [ -s .gitattributes.tmp ]; then
              mv .gitattributes.tmp .gitattributes
            else
              rm -f .gitattributes .gitattributes.tmp
            fi
            git add .gitattributes
            git commit -m "Remove LFS attributes" || true
          fi

      # 8. push
      - name: Push changes
        if: steps.check.outputs.skip != 'true'
        run: |
          git push origin main
